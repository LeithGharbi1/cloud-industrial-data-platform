name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest || true

      - name: Build Docker images
        run: |
          docker build -f docker/Dockerfile.api -t api .
          docker build -f docker/Dockerfile.worker -t worker .
          docker build -f docker/Dockerfile.generator -t generator .